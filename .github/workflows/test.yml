name: Test

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Neovim
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Neovim
        run: |
          sudo apt-get update
          sudo apt-get install -y neovim

      - name: Run Lua syntax check
        run: |
          nvim --version
          nvim -l ./fzfnav.lua -c "echo 'Syntax OK'" -c "q" || echo "Syntax check done"
